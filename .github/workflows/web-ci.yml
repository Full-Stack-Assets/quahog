name: web-ci

# Typecheck + build the playable web game on PRs and branch pushes so a broken
# tsc/vite build is caught here, not only in the Vercel preview. Scoped to paths
# under QUAHOG_Web so unrelated changes don't spend CI minutes.
on:
  push:
    paths:
      - "QUAHOG_Web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "QUAHOG_Web/**"
      - ".github/workflows/web-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: QUAHOG_Web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: QUAHOG_Web/package-lock.json
      # `npm install` (not `npm ci`): the committed package-lock.json drifts from
      # package.json (e.g. @vercel/blob added without a lock refresh) and Vercel
      # deploys with `npm install`, so match that here instead of hard-failing on
      # lock drift. Refresh the lock with `npm install` locally to tighten this.
      - run: npm install --no-audit --no-fund
      - name: Typecheck + build
        run: npm run build
